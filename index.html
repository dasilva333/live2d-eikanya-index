<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eikanya Live2D Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #030708;
            --accent-gold: #d4af37;
            --accent-teal: #143537;
            --card-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(212, 175, 55, 0.15);
            --text-muted: rgba(255, 255, 255, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(20, 53, 55, 0.3) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(212, 175, 55, 0.05) 0%, transparent 40%);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 30px 40px;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            z-index: 100;
            position: sticky;
            top: 0;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo-section {
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            letter-spacing: 0.05em;
            color: var(--accent-gold);
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        .subtitle {
            font-weight: 300;
            letter-spacing: 0.3em;
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-top: 2px;
        }

        .nav-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-secondary:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: var(--accent-gold);
        }

        /* Stats bar */
        .stats-bar {
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            padding: 12px 40px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .stats-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            gap: 30px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-val {
            color: var(--accent-gold);
            font-weight: 600;
        }

        /* Layout Main Containers */
        main {
            flex: 1;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        /* 1. Hub View: Franchise Grid */
        #franchise-hub {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .franchise-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .franchise-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-teal), var(--accent-gold));
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 3;
        }

        .franchise-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-gold);
            box-shadow: 0 20px 40px rgba(212, 175, 55, 0.08);
        }

        .franchise-card:hover::before {
            opacity: 1;
        }

        .franchise-card-content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
            flex: 1;
            padding-right: 90px;
        }

        .franchise-card-image-container {
            position: absolute;
            top: 0;
            right: 0;
            width: 140px;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
        }

        .franchise-card-bg-img {
            height: 85%;
            width: auto;
            object-fit: contain;
            opacity: 0.25;
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.6));
            -webkit-mask-image: linear-gradient(to left, rgba(0,0,0,1) 40%, rgba(0,0,0,0) 100%);
            mask-image: linear-gradient(to left, rgba(0,0,0,1) 40%, rgba(0,0,0,0) 100%);
        }

        .franchise-card:hover .franchise-card-bg-img {
            opacity: 0.75;
            transform: scale(1.12) translateY(-5px);
            filter: drop-shadow(0 6px 15px rgba(212, 175, 55, 0.25));
        }

        .franchise-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .franchise-title {
            font-size: 1.35rem;
            font-weight: 600;
            color: #fff;
            line-height: 1.2;
        }

        .franchise-count-badge {
            background: rgba(212, 175, 55, 0.15);
            color: var(--accent-gold);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .franchise-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .franchise-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 15px;
        }

        .format-pills {
            display: flex;
            gap: 8px;
        }

        .pill {
            font-size: 0.65rem;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .pill-moc3 {
            background: rgba(20, 53, 55, 0.5);
            border: 1px solid rgba(20, 53, 55, 0.8);
            color: #4ade80;
        }

        .pill-moc {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #cbd5e1;
        }

        .enter-link {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* 2. Gallery View Container */
        #gallery-view {
            display: none;
            flex-direction: column;
            gap: 30px;
        }

        .gallery-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 20px;
        }

        .gallery-title-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            border-color: var(--accent-gold);
            background: rgba(212, 175, 55, 0.1);
        }

        /* Filters & Search Control Bar */
        .controls-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .search-wrapper {
            position: relative;
            max-width: 400px;
            width: 100%;
        }

        .search-input {
            width: 100%;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 25px;
            color: white;
            font-family: 'Outfit', sans-serif;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: var(--accent-gold);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
        }

        .filter-group {
            display: flex;
            gap: 10px;
        }

        .filter-btn, .limit-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn.active, .filter-btn:hover, .limit-btn.active, .limit-btn:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
            background: rgba(212, 175, 55, 0.08);
        }

        /* Card grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 30px;
        }

        .character-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 1/1.2;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
        }

        .character-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-gold);
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.1);
        }

        .card-img-container {
            flex: 1;
            overflow: hidden;
            position: relative;
            background: radial-gradient(circle, rgba(20,53,55,0.2) 0%, transparent 80%);
        }

        .character-card img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: top center;
            transition: transform 0.5s ease;
        }

        .character-card:hover img {
            transform: scale(1.05);
        }

        .card-format-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            font-size: 0.6rem;
            padding: 3px 6px;
            border-radius: 4px;
            font-weight: 600;
            z-index: 10;
        }

        .card-info {
            padding: 15px;
            background: linear-gradient(180deg, rgba(0,0,0,0.1), rgba(0,0,0,0.8));
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card-name {
            font-weight: 600;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-download {
            width: 100%;
            padding: 8px 0;
            background: var(--accent-gold);
            border: none;
            border-radius: 6px;
            color: var(--bg-deep);
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-download:hover {
            background: #fff;
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3);
        }

        .btn-download:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Pagination controls */
        .pagination-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }

        .pagination-info {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Lightbox Modal CSS */
        .lightbox-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .lightbox-modal.active {
            display: flex;
            opacity: 1;
        }

        .lightbox-content-container {
            position: relative;
            max-width: 90%;
            max-height: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .lightbox-modal.active .lightbox-content-container {
            transform: scale(1);
        }

        .lightbox-img {
            max-width: 100%;
            max-height: 70vh;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .lightbox-close {
            position: absolute;
            top: 30px;
            right: 40px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            z-index: 1010;
        }

        .lightbox-close:hover,
        .lightbox-close:focus {
            color: var(--accent-gold);
            text-decoration: none;
            cursor: pointer;
        }

        .lightbox-caption {
            text-align: center;
            color: #fff;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            border-radius: 12px;
            max-width: 600px;
            width: 100%;
        }

        #lightbox-title {
            font-size: 1.4rem;
            color: var(--accent-gold);
            margin: 0 0 5px 0;
            font-family: 'Outfit', sans-serif;
        }

        #lightbox-subtitle {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: block;
            margin-bottom: 10px;
        }

        .lightbox-tags-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            margin-top: 10px;
            max-height: 80px;
            overflow-y: auto;
        }

        .lightbox-tag-pill {
            font-size: 0.65rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #cbd5e1;
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* Global ambient particle canvas */
        .ambient-glow {
            position: fixed;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), rgba(212, 175, 55, 0.03) 0%, transparent 30%);
            z-index: 1;
            top: 0;
            left: 0;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-deep);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent-teal);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-gold);
        }
    </style>
</head>
<body>
    <div class="ambient-glow" id="glow"></div>
    
    <header>
        <div class="header-content">
            <div class="logo-section" id="logo-btn">
                <h1>Eikanya Archive</h1>
                <div class="subtitle">Live2D Preservation Initiative</div>
            </div>
            <div class="nav-controls">
                <button class="btn-secondary" id="btn-view-all">
                    <span>🌐 View Catalog</span>
                </button>
            </div>
        </div>
    </header>

    <div class="stats-bar">
        <div class="stats-content">
            <div class="stat-item">Total Models: <span class="stat-val" id="stat-total">0</span></div>
            <div class="stat-item">Franchises: <span class="stat-val" id="stat-franchises">0</span></div>
            <div class="stat-item">Modern (moc3): <span class="stat-val" id="stat-moc3">0</span></div>
            <div class="stat-item">Legacy (moc): <span class="stat-val" id="stat-moc">0</span></div>
        </div>
    </div>

    <main>
        <!-- 1. Hub View -->
        <div id="franchise-hub">
            <!-- Populated via Javascript -->
        </div>

        <!-- 2. Detail Grid View -->
        <div id="gallery-view">
            <div class="gallery-header">
                <div class="gallery-title-area">
                    <button class="btn-back" id="btn-gallery-back" title="Back to Franchises">
                        <span>←</span>
                    </button>
                    <div>
                        <h2 id="gallery-franchise-name" style="font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--accent-gold);">Franchise Name</h2>
                        <span id="gallery-franchise-subtitle" class="subtitle" style="font-size: 0.65rem;">Preserved Catalog</span>
                    </div>
                </div>
                <div class="controls-bar">
                    <div class="search-wrapper">
                        <input type="text" id="gallery-search" class="search-input" placeholder="Search by name or slug...">
                    </div>
                    <div style="display: flex; gap: 15px; align-items: center;">
                        <div class="filter-group">
                            <button class="filter-btn active" data-type="all">All</button>
                            <button class="filter-btn" data-type="moc3">moc3</button>
                            <button class="filter-btn" data-type="moc">moc</button>
                        </div>
                        <div class="filter-group page-limit-group">
                            <button class="limit-btn active" data-limit="50">50</button>
                            <button class="limit-btn" data-limit="100">100</button>
                            <button class="limit-btn" data-limit="200">200</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="cards-grid" id="cards-container">
                <!-- Cards populated via JS -->
            </div>

            <div class="pagination-container" id="pagination-controls">
                <button class="btn-secondary" id="btn-page-prev">Previous</button>
                <span class="pagination-info" id="page-info">Page 1 of 1</span>
                <button class="btn-secondary" id="btn-page-next">Next</button>
            </div>
        </div>
    </main>

    <!-- Lightbox Modal -->
    <div id="lightbox-modal" class="lightbox-modal">
        <span class="lightbox-close" id="lightbox-close">&times;</span>
        <div class="lightbox-content-container">
            <img class="lightbox-img" id="lightbox-img" src="" alt="Preview">
            <div class="lightbox-caption">
                <h3 id="lightbox-title"></h3>
                <span id="lightbox-subtitle" class="subtitle"></span>
                <div id="lightbox-tags" class="lightbox-tags-container"></div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        const glow = document.getElementById('glow');
        const franchiseHub = document.getElementById('franchise-hub');
        const galleryView = document.getElementById('gallery-view');
        const cardsContainer = document.getElementById('cards-container');
        
        // Lightbox Elements
        const lightboxModal = document.getElementById('lightbox-modal');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxTitle = document.getElementById('lightbox-title');
        const lightboxSubtitle = document.getElementById('lightbox-subtitle');
        const lightboxTags = document.getElementById('lightbox-tags');
        const lightboxClose = document.getElementById('lightbox-close');
        
        // Navigation Elements
        const logoBtn = document.getElementById('logo-btn');
        const btnViewAll = document.getElementById('btn-view-all');
        const btnGalleryBack = document.getElementById('btn-gallery-back');
        
        // Search/Filter Elements
        const gallerySearch = document.getElementById('gallery-search');
        const filterBtns = document.querySelectorAll('.filter-group .filter-btn');
        const galleryFranchiseName = document.getElementById('gallery-franchise-name');
        
        // Pagination Elements
        const btnPagePrev = document.getElementById('btn-page-prev');
        const btnPageNext = document.getElementById('btn-page-next');
        const pageInfo = document.getElementById('page-info');

        // Target raw file host
        const BASE_RAW_URL = 'https://raw.githubusercontent.com/Eikanya/Live2d-model/master/';

        // Global dataset state
        let characterList = [];
        let fileMap = {};
        
        // Filter state
        let currentFranchise = null; // null means 'all' (Global view)
        let currentFormatFilter = 'all'; // all, moc3, moc
        let currentSearchQuery = '';
        let currentPage = 1;
        let itemsPerPage = 50;

        // Hardcoded curated descriptions for franchises
        const franchiseMetadata = {
            "BanG Dream!": { name: "BanG Dream!", desc: "Popular rhythm and anime franchise by Bushiroad.", tags: ["Rhythm", "Anime"] },
            "destiny_child_kr 天命之子": { name: "Destiny Child (KR)", desc: "Stunning Live2D models from Shift Up's flagship tactical RPG.", tags: ["RPG", "Gacha"] },
            "少女前线 girls Frontline": { name: "Girls' Frontline", desc: "Tactical RPG featuring anthropomorphized firearms.", tags: ["Tactical", "RPG"] },
            "galgame live2d": { name: "Visual Novels & Galgames", desc: "A collection of characters from popular visual novels.", tags: ["Visual Novel", "Anime"] },
            "凍京Nerco": { name: "Tokyo Necro", desc: "Cyberpunk tactical RPG from Nitroplus.", tags: ["Cyberpunk", "RPG"] },
            "少女咖啡枪 girls cafe gun": { name: "Girls Cafe Gun", desc: "Action shooter RPG featuring cafe management.", tags: ["Shooter", "Cafe"] },
            "碧蓝航线 Azue Lane": { name: "Azur Lane", desc: "Naval warfare tactical RPG featuring shipgirls.", tags: ["Naval", "Military"] },
            "诺亚幻想": { name: "Noah Fantasy", desc: "Fantasyland magical school RPG.", tags: ["Fantasy", "School"] },
            "食物语": { name: "The Tale of Food", desc: "Mobile RPG featuring personified traditional Chinese dishes.", tags: ["RPG", "Fantasy"] },
            "少女次元": { name: "Girls Dimension", desc: "Anime RPG featuring dimensional battles.", tags: ["RPG", "Anime"] },

        // Track mouse for ambient hover glow
        window.addEventListener('mousemove', e => {
            glow.style.setProperty('--mx', e.clientX + 'px');
            glow.style.setProperty('--my', e.clientY + 'px');
        });

        // Lightbox functions
        function openLightbox(src, name, franchise, tags) {
            lightboxImg.src = src;
            lightboxTitle.textContent = name;
            
            const meta = franchiseMetadata[franchise] || { name: franchise };
            lightboxSubtitle.textContent = `${meta.name} (${franchise})`;

            lightboxTags.innerHTML = '';
            if (tags && tags.length > 0) {
                tags.forEach(tag => {
                    const pill = document.createElement('span');
                    pill.className = 'lightbox-tag-pill';
                    pill.textContent = tag;
                    lightboxTags.appendChild(pill);
                });
            } else {
                lightboxTags.innerHTML = '<span style="color: var(--text-muted); font-size: 0.75rem;">No tags available</span>';
            }

            lightboxModal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightboxModal.classList.remove('active');
            document.body.style.overflow = '';
        }

        lightboxClose.onclick = closeLightbox;
        lightboxModal.onclick = (e) => {
            if (e.target === lightboxModal) {
                closeLightbox();
            }
        };

        window.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                closeLightbox();
            }
        });

        // Initialize and fetch database files
        async function init() {
            try {
                const [listRes, mapRes] = await Promise.all([
                    fetch('character_list.json'),
                    fetch('file_map.json')
                ]);
                characterList = await listRes.json();
                fileMap = await mapRes.json();

                renderDashboardStats();
                renderFranchiseHub();
            } catch (err) {
                console.error('Initialization failed:', err);
                franchiseHub.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--accent-gold);">Archive index metadata files not found. Run scripts/build_metadata.js first.</div>`;
            }
        }

        // Render stats bar details
        function renderDashboardStats() {
            document.getElementById('stat-total').textContent = characterList.length.toLocaleString();
            
            const franchises = [...new Set(characterList.map(c => c.franchise))];
            document.getElementById('stat-franchises').textContent = franchises.length;

            const moc3Count = characterList.filter(c => c.type === 'moc3').length;
            const mocCount = characterList.filter(c => c.type === 'moc').length;
            
            document.getElementById('stat-moc3').textContent = moc3Count.toLocaleString();
            document.getElementById('stat-moc').textContent = mocCount.toLocaleString();
        }

        // Render main Franchise selector hub
        function renderFranchiseHub() {
            // Clear current layouts
            franchiseHub.style.display = 'grid';
            galleryView.style.display = 'none';
            btnViewAll.style.display = 'flex';

            // Group models by franchise
            const groups = {};
            characterList.forEach(item => {
                if (!groups[item.franchise]) {
                    groups[item.franchise] = {
                        rawName: item.franchise,
                        total: 0,
                        moc3: 0,
                        moc: 0
                    };
                }
                groups[item.franchise].total++;
                groups[item.franchise][item.type]++;
            });

            // Map and sort groups by count descending
            const sortedFranchises = Object.values(groups).sort((a, b) => b.total - a.total);

            franchiseHub.innerHTML = '';
            sortedFranchises.forEach(group => {
                const meta = franchiseMetadata[group.rawName] || { name: group.rawName, desc: 'Preserved community assets and animations.', tags: [] };
                
                // Get all models in this franchise that have thumbnails
                const groupModels = characterList.filter(item => item.franchise === group.rawName && item.hasThumbnail);
                let randomThumb = '';
                if (groupModels.length > 0) {
                    const randomModel = groupModels[Math.floor(Math.random() * groupModels.length)];
                    randomThumb = `thumbnails/${randomModel.slug}.png`;
                }

                const card = document.createElement('div');
                card.className = 'franchise-card';
                card.onclick = () => showGalleryForFranchise(group.rawName);

                card.innerHTML = `
                    <div class="franchise-card-content">
                        <div>
                            <div class="franchise-header">
                                <div>
                                    <span class="franchise-title">${meta.name}</span>
                                    <span class="franchise-original" style="font-size: 0.7rem; color: var(--text-muted); display: block; margin-top: 4px;">Folder: ${group.rawName}</span>
                                </div>
                                <span class="franchise-count-badge">${group.total}</span>
                            </div>
                            <p class="franchise-desc">${meta.desc}</p>
                        </div>
                        <div class="franchise-footer">
                            <div class="format-pills">
                                ${group.moc3 > 0 ? `<span class="pill pill-moc3">${group.moc3} moc3</span>` : ''}
                                ${group.moc > 0 ? `<span class="pill pill-moc">${group.moc} moc</span>` : ''}
                            </div>
                            <span class="enter-link">Explore →</span>
                        </div>
                    </div>
                    ${randomThumb ? `
                    <div class="franchise-card-image-container">
                        <img src="${randomThumb}" alt="Preview" class="franchise-card-bg-img" loading="lazy">
                    </div>
                    ` : ''}
                `;
                franchiseHub.appendChild(card);
            });
        }

        // Show detailed gallery view
        function showGalleryForFranchise(franchiseName) {
            currentFranchise = franchiseName; // if null, matches "Global View"
            currentFormatFilter = 'all';
            currentSearchQuery = '';
            currentPage = 1;
            
            gallerySearch.value = '';
            filterBtns.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.type === 'all');
            });

            // Set Title text
            if (franchiseName) {
                const meta = franchiseMetadata[franchiseName] || { name: franchiseName };
                galleryFranchiseName.textContent = meta.name;
                btnViewAll.style.display = 'flex';
            } else {
                galleryFranchiseName.textContent = 'All Preserved Models';
                btnViewAll.style.display = 'none';
            }

            franchiseHub.style.display = 'none';
            galleryView.style.display = 'flex';
            
            updateGalleryGrid();
        }

        // Filter and Paginate models grid
        function updateGalleryGrid() {
            // Apply filtering logic
            let filtered = characterList;

            if (currentFranchise) {
                filtered = filtered.filter(item => item.franchise === currentFranchise);
            }

            if (currentFormatFilter !== 'all') {
                filtered = filtered.filter(item => item.type === currentFormatFilter);
            }

            if (currentSearchQuery) {
                const q = currentSearchQuery.toLowerCase();
                filtered = filtered.filter(item => 
                    item.name.toLowerCase().includes(q) || 
                    item.slug.toLowerCase().includes(q) ||
                    (item.tags && item.tags.some(tag => tag.toLowerCase().includes(q)))
                );
            }

            // Paginate
            const totalItems = filtered.length;
            const totalPages = Math.ceil(totalItems / itemsPerPage) || 1;

            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;

            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pageItems = filtered.slice(startIndex, endIndex);

            // Update page pagination display info
            pageInfo.textContent = `Page ${currentPage} of ${totalPages} (${totalItems} total)`;
            btnPagePrev.disabled = currentPage === 1;
            btnPageNext.disabled = currentPage === totalPages;

            // Render items
            cardsContainer.innerHTML = '';
            if (pageItems.length === 0) {
                cardsContainer.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 40px 0;">No matching models found in this category.</div>`;
                return;
            }

            pageItems.forEach(item => {
                const card = document.createElement('div');
                card.className = 'character-card';
                card.style.cursor = 'pointer';
                card.onclick = () => openLightbox(`thumbnails/${item.slug}.png`, item.name, item.franchise, item.tags || []);

                const badgeClass = item.type === 'moc3' ? 'pill-moc3' : 'pill-moc';
                const thumbnailSrc = item.hasThumbnail ? `thumbnails/${item.slug}.png` : 'fallback.png';

                card.innerHTML = `
                    <div class="card-img-container">
                        <span class="card-format-badge ${badgeClass}">${item.type}</span>
                        <img src="${thumbnailSrc}" alt="${item.name}" loading="lazy" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%23143537%22/><text x=%2250%22 y=%2255%22 font-family=%22Outfit%22 font-size=%2212%22 fill=%22%23d4af37%22 text-anchor=%22middle%22>No Preview</text></svg>'">
                    </div>
                    <div class="card-info">
                        <div class="card-name" title="${item.name}">${item.name}</div>
                        <button class="btn-download" onclick="downloadAssets(event, '${item.slug}')">
                            <span>📦 Download Package</span>
                        </button>
                    </div>
                `;
                cardsContainer.appendChild(card);
            });
        }

        // On-the-fly client-side packaging download script
        async function downloadAssets(event, slug) {
            event.stopPropagation();
            const btn = event.currentTarget;
            const originalHTML = btn.innerHTML;
            const files = fileMap[slug];

            // 1x1 Transparent Fallback Pixel
            const TRANSPARENT_PNG_BIN = atob('iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg==');
            const transparentUint8 = new Uint8Array(TRANSPARENT_PNG_BIN.length);
            for (let i = 0; i < TRANSPARENT_PNG_BIN.length; i++) transparentUint8[i] = TRANSPARENT_PNG_BIN.charCodeAt(i);

            if (!files || files.length === 0) {
                alert(`No asset manifest mapping found for: ${slug}`);
                return;
            }

            try {
                btn.disabled = true;
                btn.innerHTML = '<span>⏳ Fetching...</span>';

                const zip = new JSZip();
                const total = files.length;
                let done = 0;

                // Determine the model's base parent dir to strip from zip structure (makes it clean upon extraction)
                // e.g. "BanG Dream!/asneeded/live2d/chara/001/001_2018_dog/.model.json" -> strip prefix
                const firstFile = files[0];
                const parts = firstFile.split('/');
                const prefixParts = parts.slice(0, parts.length - 1);
                const prefix = prefixParts.join('/');

                const fetchPromises = files.map(async (relPath) => {
                    const url = `${BASE_RAW_URL}${relPath}`;
                    
                    // Determine internal zip path (strip parent folder prefix structure)
                    let zipPath = relPath;
                    if (prefix && relPath.startsWith(prefix + '/')) {
                        zipPath = relPath.substring(prefix.length + 1);
                    }

                    let res;
                    try {
                        res = await fetch(url);
                        if (!res.ok) throw new Error('404');
                    } catch (e) {
                        console.warn(`[ZIP] Asset failed to fetch: ${relPath}. Injecting transparent placeholder.`);
                        if (relPath.toLowerCase().includes('.png')) {
                            zip.file(zipPath, transparentUint8);
                            done++;
                            btn.innerHTML = `<span>⚡ ${done}/${total}</span>`;
                            return;
                        }
                        throw e; // Fail hard on core components (e.g. moc/json)
                    }

                    // Model configuration cleanup and bloom overlay re-ordering
                    if (relPath.toLowerCase().endsWith('.model3.json')) {
                        try {
                            const data = await res.json();
                            if (data.FileReferences && data.FileReferences.Textures) {
                                const textures = data.FileReferences.Textures;
                                const bloom = textures.filter(t => t.toLowerCase().includes('_bloom'));
                                const main = textures.filter(t => !t.toLowerCase().includes('_bloom'));
                                if (bloom.length > 0) {
                                    data.FileReferences.Textures = [...main, ...bloom];
                                }
                            }
                            zip.file(zipPath, JSON.stringify(data, null, 2));
                        } catch (e) {
                            const blob = await res.blob();
                            zip.file(zipPath, blob);
                        }
                    } else {
                        const blob = await res.blob();
                        zip.file(zipPath, blob);
                    }

                    done++;
                    btn.innerHTML = `<span>⚡ ${done}/${total}</span>`;
                });

                await Promise.all(fetchPromises);
                
                btn.innerHTML = '<span>📦 Compiling...</span>';
                const zipBlob = await zip.generateAsync({ type: 'blob' });
                
                const link = document.createElement('a');
                link.href = URL.createObjectURL(zipBlob);
                link.download = `${slug}.zip`;
                link.click();

                btn.innerHTML = '<span>✅ Complete!</span>';
            } catch (err) {
                console.error('Packaging failed:', err);
                btn.innerHTML = '<span>❌ Failed</span>';
                alert('Failed to download assets: core model files missing or blocked by server.');
            } finally {
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerHTML = originalHTML;
                }, 3000);
            }
        }

        // Search trigger event
        gallerySearch.addEventListener('input', e => {
            currentSearchQuery = e.target.value;
            currentPage = 1;
            updateGalleryGrid();
        });

        // Filter trigger events
        filterBtns.forEach(btn => {
            btn.addEventListener('click', e => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                currentFormatFilter = btn.dataset.type;
                currentPage = 1;
                updateGalleryGrid();
            });
        });

        // Limit trigger events
        const limitBtns = document.querySelectorAll('.page-limit-group .limit-btn');
        limitBtns.forEach(btn => {
            btn.addEventListener('click', e => {
                limitBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                itemsPerPage = parseInt(btn.dataset.limit, 10);
                currentPage = 1;
                updateGalleryGrid();
            });
        });

        // Pagination buttons
        btnPagePrev.onclick = () => {
            if (currentPage > 1) {
                currentPage--;
                updateGalleryGrid();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };

        btnPageNext.onclick = () => {
            currentPage++;
            updateGalleryGrid();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        // Navigation bindings
        logoBtn.onclick = renderFranchiseHub;
        btnGalleryBack.onclick = renderFranchiseHub;
        btnViewAll.onclick = () => showGalleryForFranchise(null); // Show global catalog view

        init();
    </script>
